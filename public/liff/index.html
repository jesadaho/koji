<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Koji — จัดการแจ้งเตือน</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f1419;
        --card: #1a2332;
        --text: #e7ecf3;
        --muted: #8b9cb3;
        --accent: #06c755;
        --danger: #e85d4c;
        --border: #2d3a4d;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f4f6f9;
          --card: #fff;
          --text: #1a1a1a;
          --muted: #5c6b7a;
          --border: #dde3ea;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        line-height: 1.45;
        padding: 1rem;
        padding-bottom: max(1rem, env(safe-area-inset-bottom));
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin: 0 0 0.25rem;
      }
      .sub {
        color: var(--muted);
        font-size: 0.875rem;
        margin-bottom: 1.25rem;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1rem;
        margin-bottom: 1rem;
      }
      label {
        display: block;
        font-size: 0.8rem;
        color: var(--muted);
        margin-bottom: 0.35rem;
      }
      input,
      select,
      button {
        font: inherit;
        border-radius: 8px;
        border: 1px solid var(--border);
        padding: 0.6rem 0.75rem;
        width: 100%;
        background: var(--bg);
        color: var(--text);
      }
      button {
        cursor: pointer;
        font-weight: 600;
        border: none;
        margin-top: 0.75rem;
      }
      button.primary {
        background: var(--accent);
        color: #fff;
      }
      button.danger {
        background: transparent;
        color: var(--danger);
        border: 1px solid var(--danger);
        width: auto;
        padding: 0.35rem 0.65rem;
        margin-top: 0;
        font-size: 0.8rem;
      }
      .row {
        display: grid;
        gap: 0.75rem;
        margin-bottom: 0.75rem;
      }
      @media (min-width: 480px) {
        .row.cols-2 {
          grid-template-columns: 1fr 1fr;
        }
      }
      .alert-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        padding: 0.65rem 0;
        border-bottom: 1px solid var(--border);
      }
      .alert-item:last-child {
        border-bottom: none;
        padding-bottom: 0;
      }
      .alert-item:first-child {
        padding-top: 0;
      }
      .err {
        color: var(--danger);
        font-size: 0.875rem;
        margin-top: 0.5rem;
      }
      .price-box {
        font-size: 1.1rem;
        font-weight: 600;
      }
      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="screen-loading" class="card">กำลังโหลด…</div>
    <div id="screen-setup" class="card hidden"></div>
    <div id="app" class="hidden">
      <h1>Koji</h1>
      <p class="sub" id="welcome">MEXC Futures — จัดการแจ้งเตือน</p>

      <div class="card">
        <h2 style="font-size: 1rem; margin: 0 0 0.75rem">เช็คราคาเร็ว</h2>
        <div class="row cols-2">
          <div>
            <label for="q-symbol">สัญญา / ย่อ (btc, BTC_USDT)</label>
            <input id="q-symbol" type="text" placeholder="btc" autocomplete="off" />
          </div>
          <div style="display: flex; align-items: flex-end">
            <button type="button" class="primary" id="btn-price" style="margin-top: 1.4rem">ดูราคา</button>
          </div>
        </div>
        <div id="price-result" class="hidden"></div>
        <div id="price-err" class="err hidden"></div>
      </div>

      <div class="card">
        <h2 style="font-size: 1rem; margin: 0 0 0.75rem">เพิ่มการแจ้งเตือน</h2>
        <div class="row">
          <div>
            <label for="a-symbol">สัญญา / ย่อ</label>
            <input id="a-symbol" type="text" list="syms" placeholder="eth" autocomplete="off" />
            <datalist id="syms"></datalist>
          </div>
        </div>
        <div class="row cols-2">
          <div>
            <label for="a-dir">ทิศทาง</label>
            <select id="a-dir">
              <option value="above">ราคาเกิน (≥)</option>
              <option value="below">ราคาต่ำกว่า (≤)</option>
            </select>
          </div>
          <div>
            <label for="a-target">เป้า (USDT)</label>
            <input id="a-target" type="number" inputmode="decimal" min="0" step="any" placeholder="4000" />
          </div>
        </div>
        <button type="button" class="primary" id="btn-add">บันทึก</button>
        <div id="add-err" class="err hidden"></div>
      </div>

      <div class="card">
        <h2 style="font-size: 1rem; margin: 0 0 0.75rem">รายการแจ้งเตือน</h2>
        <div id="alert-list"></div>
        <p id="alert-empty" class="sub" style="margin: 0; display: none">ยังไม่มีรายการ</p>
      </div>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
